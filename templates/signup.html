<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up – Hilal Exchange</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #000428 0%, #004e92 100%);
      font-family: Georgia, 'Times New Roman', Times, serif;
      padding: 30px 20px;
    }

    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .logo { color: white; font-size: 18px; font-weight: bold; text-decoration: none; }
    .logo span { color: #4fc3f7; }

    .top-nav a.nav-btn {
      color: white;
      font-size: 14px;
      text-decoration: none;
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.4);
      transition: background 0.2s;
    }

    .top-nav a.nav-btn:hover { background: rgba(255,255,255,0.15); }

    .card {
      margin-top: 70px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 36px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
    }

    h1 { color: white; font-size: 26px; margin-bottom: 4px; }
    h2 { color: rgba(255,255,255,0.6); font-size: 14px; font-weight: normal; margin-bottom: 20px; }

    input {
      width: 100%;
      border-radius: 25px;
      height: 48px;
      margin-top: 11px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 15px;
      padding: 0 18px;
      outline: none;
      transition: border 0.2s, background 0.2s;
      font-family: inherit;
    }

    input::placeholder { color: rgba(255,255,255,0.5); }
    input:focus { border-color: #4fc3f7; background: rgba(255,255,255,0.16); }

    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 16px;
      width: 100%;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      line-height: 1.5;
    }

    .terms-row input[type="checkbox"] {
      width: 16px; height: 16px;
      min-width: 16px;
      margin-top: 2px;
      accent-color: #4fc3f7;
    }

    .msg {
      width: 100%;
      margin-top: 14px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .msg.error  { background: rgba(220,50,50,0.25);  color: #ffaaaa; border: 1px solid rgba(220,50,50,0.4); }
    .msg.success{ background: rgba(50,200,100,0.25); color: #aaffcc; border: 1px solid rgba(50,200,100,0.4); }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      background: darkblue;
      color: white;
      border: 2px solid rgba(255,255,255,0.4);
      margin-top: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      font-family: inherit;
    }

    .btn:hover:not(:disabled) { background: #0000bb; transform: scale(1.02); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .switch {
      color: rgba(255,255,255,0.7);
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
    }

    .switch a { color: #4fc3f7; text-decoration: underline; }

    footer {
      margin-top: 24px;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      text-align: center;
    }

    footer a { color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="/" class="logo">Hilal <span>Exchange</span></a>
    <a href="/login" class="nav-btn">Login</a>
  </nav>

  <div class="card">
    <h1>Create Account</h1>
    <h2>Join Hilal Exchange today</h2>

    <input id="username"  placeholder="Username" autocomplete="off">
    <input id="dob"       type="date" title="Date of Birth">
    <input id="phone"     placeholder="Phone Number" type="tel">
    <input id="email"     placeholder="Email" type="email">
    <input id="password"  placeholder="Password" type="password">
    <input id="confirm"   placeholder="Confirm Password" type="password">

    <div class="terms-row">
      <input type="checkbox" id="terms">
      <label for="terms">I accept the terms and privacy policy of Hilal Exchange.</label>
    </div>

    <div class="msg" id="msg"></div>

    <button class="btn" id="signupBtn" onclick="handleSignup()">Sign Up</button>

    <p class="switch">Already have an account? <a href="/login">Login here</a></p>
  </div>

  <footer>
    <p><a href="https://wa.me/qr/SAH2B7LOUBY4K1">Contact Us</a> &nbsp;·&nbsp; ©2026 Hilal Dev.</p>
  </footer>

  <script>
    function showMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = "msg " + type;
      el.style.display = "block";
    }

    async function handleSignup() {
      const username = document.getElementById("username").value.trim();
      const dob      = document.getElementById("dob").value;
      const phone    = document.getElementById("phone").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm  = document.getElementById("confirm").value;
      const terms    = document.getElementById("terms").checked;
      const btn      = document.getElementById("signupBtn");

      // Client-side validation
      if (!username || !email || !password || !confirm)
        return showMsg("Please fill in all required fields.", "error");
      if (username.length < 3)
        return showMsg("Username must be at least 3 characters.", "error");
      if (username.length > 20)
        return showMsg("Username must be 20 characters or fewer.", "error");
      if (!email.match(/^[^@]+@[^@]+\.[^@]+$/))
        return showMsg("Enter a valid email address.", "error");
      if (password.length < 8)
        return showMsg("Password must be at least 8 characters.", "error");
      if (password !== confirm)
        return showMsg("Passwords do not match.", "error");
      if (!terms)
        return showMsg("You must accept the terms to continue.", "error");

      btn.disabled = true;
      btn.textContent = "Creating account...";

      try {
        const res = await fetch("/signup/endpoint", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password, dob, phone })
        });

        const data = await res.json();

        if (data.success) {
          showMsg("Account created! Redirecting to login...", "success");
          setTimeout(() => window.location.href = "/login", 1800);
        } else {
          showMsg(data.message || "Signup failed. Try again.", "error");
          btn.disabled = false;
          btn.textContent = "Sign Up";
        }
      } catch (err) {
        showMsg("Network error. Check your connection.", "error");
        btn.disabled = false;
        btn.textContent = "Sign Up";
      }
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") handleSignup(); });
  </script>

</body>
</html>
